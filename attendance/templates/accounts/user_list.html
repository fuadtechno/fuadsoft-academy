{% extends 'base.html' %}
{% block title %}Users{% endblock %}
{% block content %}
<div class="row mb-3"><div class="col"><h2>Users</h2></div><div class="col-auto"><a href="{% url 'user_create' %}" class="btn btn-primary">Add User</a></div></div>
<div class="card">
    <div class="card-body">
        <table class="table">
            <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Active</th></tr></thead>
            <tbody>{% for user in users %}<tr><td>{{ user.username }}</td><td>{{ user.email }}</td><td>{{ user.role }}</td><td>{{ user.is_active }}</td></tr>{% endfor %}</tbody>
        </table>
    </div>
</div>
{% endblock %}
