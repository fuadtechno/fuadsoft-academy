{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">Confirm Delete</div>
    <div class="card-body">
        <p>Are you sure you want to delete {{ object }}?</p>
        <form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Delete</button></form>
    </div>
</div>
{% endblock %}
