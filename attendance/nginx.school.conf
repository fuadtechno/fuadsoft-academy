upstream django_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.fuadsoft\.com$;

    client_max_body_size 10M;

    access_log /var/log/nginx/school_access.log;
    error_log /var/log/nginx/school_error.log;

    location /static/ {
        alias /var/www/django-project/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/django-project/media/;
        expires 7d;
    }

    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header X-Subdomain $subdomain;

        proxy_pass http://django_app;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /health/ {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    server_name fuadsoft.com www.fuadsoft.com;

    client_max_body_size 10M;

    access_log /var/log/nginx/school_access.log;
    error_log /var/log/nginx/school_error.log;

    location /static/ {
        alias /var/www/django-project/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /var/www/django-project/media/;
        expires 7d;
    }

    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_pass http://django_app;
        proxy_redirect off;
    }
}