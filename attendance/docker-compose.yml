version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: school_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py migrate && gunicorn --bind 0.0.0.0:8000 school_project.wsgi:application
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=school_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SECRET_KEY=your-secret-key
      - DEBUG=False
    depends_on:
      - db

volumes:
  postgres_data:
  media_volume: